services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-secure_lock}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure123}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - secure_lock_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - secure_lock_network

  backend:
    build: .
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
      gunicorn secure_lock.asgi:application 
      -k uvicorn.workers.UvicornWorker 
      --bind 0.0.0.0:8000 
      --workers 4 
      --access-logfile - 
      --error-logfile - 
      --log-level info"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=secure_lock.settings
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - secure_lock_network

  celery_worker:
    build: .
    restart: unless-stopped
    command: celery -A secure_lock worker -l info --concurrency=4
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - secure_lock_network

  celery_beat:
    build: .
    restart: unless-stopped
    command: celery -A secure_lock beat -l info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - secure_lock_network

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - secure_lock_network

volumes:
  postgres_data:
  redis_data:

networks:
  secure_lock_network:
    driver: bridge